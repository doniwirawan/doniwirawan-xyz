<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800" role="img" aria-label="Learning what enough feels like">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#141619"/>
      <stop offset="1" stop-color="#0b0c0e"/>
    </linearGradient>
    <linearGradient id="accent4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5b8cff"/>
      <stop offset="1" stop-color="#4a7bf0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="800" fill="url(#bg4)"/>

  <!-- Everything you could own, running off the edge of the frame. Only what you
       actually use is lit. The line is where "enough" sits. -->
  <g>
    <rect x="120" y="150" width="70" height="70" rx="10" fill="url(#accent4)"/>
    <rect x="210" y="150" width="70" height="70" rx="10" fill="url(#accent4)"/>
    <rect x="300" y="150" width="70" height="70" rx="10" fill="url(#accent4)"/>

    <g fill="none" stroke="#262a30" stroke-width="2">
      <rect x="420" y="150" width="70" height="70" rx="10"/>
      <rect x="510" y="150" width="70" height="70" rx="10"/>
      <rect x="600" y="150" width="70" height="70" rx="10"/>
      <rect x="690" y="150" width="70" height="70" rx="10"/>
      <rect x="780" y="150" width="70" height="70" rx="10"/>
      <rect x="870" y="150" width="70" height="70" rx="10"/>
      <rect x="960" y="150" width="70" height="70" rx="10"/>
      <rect x="1050" y="150" width="70" height="70" rx="10"/>
      <rect x="1140" y="150" width="70" height="70" rx="10"/>
    </g>

    <!-- the line where enough sits -->
    <line x1="395" y1="120" x2="395" y2="250" stroke="#5b8cff" stroke-width="3" stroke-dasharray="6 7"/>
    <text x="395" y="285" text-anchor="middle" fill="#5b8cff"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif"
          font-size="22" font-weight="700" letter-spacing="1">ENOUGH</text>
  </g>

  <text x="120" y="470" fill="#eceef1"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif"
        font-size="68" font-weight="800" letter-spacing="-2">Learning what</text>
  <text x="120" y="552" fill="#eceef1"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif"
        font-size="68" font-weight="800" letter-spacing="-2">&#8220;enough&#8221; feels like.</text>

  <text x="120" y="625" fill="#8b929c"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif"
        font-size="26" font-weight="500">The cost of owning something isn&#8217;t just money.</text>
</svg>
