<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800" role="img" aria-label="Bali Tidak Kehabisan Tanah. Kita Kehabisan Cara Berpikir.">
  <defs>
    <linearGradient id="bgBali" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1512"/>
      <stop offset="1" stop-color="#090c0a"/>
    </linearGradient>
    <linearGradient id="greenBali" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#82d17c"/>
      <stop offset="1" stop-color="#3f9d5a"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="800" fill="url(#bgBali)"/>

  <!-- Rice-terrace contours stepping down a slope: the sawah the piece is about.
       They fade as they recede, the way the fields themselves are thinning out. -->
  <g fill="none" stroke="url(#greenBali)" stroke-width="3" stroke-linecap="round">
    <path d="M120 132 C 380 96, 820 96, 1080 140" opacity="0.95"/>
    <path d="M120 186 C 380 150, 820 150, 1080 194" opacity="0.8"/>
    <path d="M120 240 C 380 204, 820 204, 1080 248" opacity="0.62"/>
    <path d="M120 294 C 380 258, 820 258, 1080 302" opacity="0.44"/>
    <path d="M120 348 C 380 312, 820 312, 1080 356" opacity="0.28"/>
  </g>

  <!-- one home that grows upward instead of eating the next field -->
  <g fill="url(#greenBali)" opacity="0.9">
    <rect x="1024" y="150" width="56" height="206" rx="7"/>
  </g>

  <text x="120" y="466" fill="#eef3ee"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif"
        font-size="78" font-weight="800" letter-spacing="-2">Bali Tidak</text>
  <text x="120" y="552" fill="#eef3ee"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif"
        font-size="78" font-weight="800" letter-spacing="-2">Kehabisan Tanah.</text>

  <text x="122" y="632" fill="#82d17c"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif"
        font-size="42" font-weight="700" letter-spacing="-1">Kita Kehabisan Cara Berpikir.</text>
</svg>
