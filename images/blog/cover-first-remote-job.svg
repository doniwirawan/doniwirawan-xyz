<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800" role="img" aria-label="I got my first remote software engineering job before I graduated">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#141619"/>
      <stop offset="1" stop-color="#0b0c0e"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5b8cff"/>
      <stop offset="1" stop-color="#4a7bf0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="800" fill="url(#bg2)"/>

  <!-- An inbox of applications that went nowhere, and the one that did not. -->
  <g>
    <rect x="120" y="120" width="700" height="44" rx="10" fill="none" stroke="#262a30" stroke-width="2"/>
    <rect x="140" y="136" width="240" height="12" rx="6" fill="#262a30"/>

    <rect x="120" y="180" width="700" height="44" rx="10" fill="none" stroke="#262a30" stroke-width="2"/>
    <rect x="140" y="196" width="320" height="12" rx="6" fill="#262a30"/>

    <!-- The offer. -->
    <rect x="120" y="240" width="700" height="44" rx="10" fill="url(#accent2)"/>
    <rect x="140" y="256" width="180" height="12" rx="6" fill="#ffffff" opacity="0.85"/>
    <circle cx="790" cy="262" r="7" fill="#ffffff"/>

    <rect x="120" y="300" width="700" height="44" rx="10" fill="none" stroke="#262a30" stroke-width="2"/>
    <rect x="140" y="316" width="280" height="12" rx="6" fill="#262a30"/>
  </g>

  <text x="120" y="500" fill="#eceef1"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif"
        font-size="66" font-weight="800" letter-spacing="-2">My first remote job,</text>
  <text x="120" y="578" fill="#eceef1"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif"
        font-size="66" font-weight="800" letter-spacing="-2">before I graduated.</text>

  <text x="120" y="650" fill="#8b929c"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif"
        font-size="26" font-weight="500">It started with an email.</text>
</svg>
