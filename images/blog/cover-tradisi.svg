<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800" role="img" aria-label="Tradisi yang Bertahan Harus Berani Berubah">
  <defs>
    <linearGradient id="bgTradisi" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1512"/>
      <stop offset="1" stop-color="#090c0a"/>
    </linearGradient>
    <linearGradient id="tealTradisi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#74d9c6"/>
      <stop offset="1" stop-color="#2f9d8a"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="800" fill="url(#bgTradisi)"/>

  <!-- A canang, the daily offering — its petals return to the water below it.
       The essence is the offering; the question is what the water is left with. -->
  <g transform="translate(1012 208)" fill="url(#tealTradisi)">
    <g opacity="0.92">
      <ellipse cx="0" cy="-33" rx="13" ry="30"/>
      <ellipse cx="0" cy="-33" rx="13" ry="30" transform="rotate(60)"/>
      <ellipse cx="0" cy="-33" rx="13" ry="30" transform="rotate(120)"/>
      <ellipse cx="0" cy="-33" rx="13" ry="30" transform="rotate(180)"/>
      <ellipse cx="0" cy="-33" rx="13" ry="30" transform="rotate(240)"/>
      <ellipse cx="0" cy="-33" rx="13" ry="30" transform="rotate(300)"/>
    </g>
    <circle cx="0" cy="0" r="15" fill="#0f1512"/>
    <circle cx="0" cy="0" r="7"/>
  </g>

  <!-- Flowing water, fading as it carries more downstream -->
  <g fill="none" stroke="url(#tealTradisi)" stroke-width="3" stroke-linecap="round">
    <path d="M120 306 q 60 -22 120 0 t 120 0 t 120 0 t 120 0 t 120 0 t 120 0 t 120 0 t 120 0" opacity="0.85"/>
    <path d="M120 348 q 60 -22 120 0 t 120 0 t 120 0 t 120 0 t 120 0 t 120 0 t 120 0 t 120 0" opacity="0.55"/>
    <path d="M120 390 q 60 -22 120 0 t 120 0 t 120 0 t 120 0 t 120 0 t 120 0 t 120 0 t 120 0" opacity="0.32"/>
  </g>

  <text x="120" y="484" fill="#eef3f1"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif"
        font-size="72" font-weight="800" letter-spacing="-2">Tradisi yang Bertahan</text>
  <text x="120" y="566" fill="#eef3f1"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif"
        font-size="72" font-weight="800" letter-spacing="-2">Harus Berani Berubah</text>

  <text x="122" y="642" fill="#74d9c6"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif"
        font-size="38" font-weight="700" letter-spacing="-1">Menjaga alam adalah bagian dari ritual.</text>
</svg>
