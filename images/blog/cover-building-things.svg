<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800" role="img" aria-label="I Think I Just Like Building Things">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#141619"/>
      <stop offset="1" stop-color="#0b0c0e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5b8cff"/>
      <stop offset="1" stop-color="#4a7bf0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>

  <!-- A grid of empty squares: the unfinished folders. One of them got built. -->
  <g fill="none" stroke="#262a30" stroke-width="2">
    <rect x="120" y="150" width="90" height="90" rx="12"/>
    <rect x="240" y="150" width="90" height="90" rx="12"/>
    <rect x="360" y="150" width="90" height="90" rx="12"/>
    <rect x="480" y="150" width="90" height="90" rx="12"/>
    <rect x="600" y="150" width="90" height="90" rx="12"/>
    <rect x="720" y="150" width="90" height="90" rx="12"/>
    <rect x="840" y="150" width="90" height="90" rx="12"/>
    <rect x="960" y="150" width="90" height="90" rx="12"/>

    <rect x="120" y="270" width="90" height="90" rx="12"/>
    <rect x="240" y="270" width="90" height="90" rx="12"/>
    <rect x="480" y="270" width="90" height="90" rx="12"/>
    <rect x="600" y="270" width="90" height="90" rx="12"/>
    <rect x="720" y="270" width="90" height="90" rx="12"/>
    <rect x="840" y="270" width="90" height="90" rx="12"/>
    <rect x="960" y="270" width="90" height="90" rx="12"/>
  </g>

  <!-- The one that became real. -->
  <rect x="360" y="270" width="90" height="90" rx="12" fill="url(#accent)"/>

  <text x="120" y="530" fill="#eceef1"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif"
        font-size="72" font-weight="800" letter-spacing="-2">I think I just like</text>
  <text x="120" y="612" fill="#eceef1"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif"
        font-size="72" font-weight="800" letter-spacing="-2">building things.</text>

  <text x="120" y="680" fill="#8b929c"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif"
        font-size="26" font-weight="500">Build something that didn't exist before.</text>
</svg>
