<main class="wrap doc">

  <section id="login">
    <h1>Sign in</h1>
    <p class="meta">Admin only.</p>
    <form class="form" id="login-form">
      <label>Email<input type="email" id="email" autocomplete="username" required></label>
      <label>Password<input type="password" id="password" autocomplete="current-password" required></label>
      <button class="btn primary" type="submit">Sign in</button>
      <p class="form-msg" id="login-msg"></p>
    </form>
  </section>

  <section id="editor" hidden>
    <h1>Posts</h1>
    <p class="meta" id="who"></p>

    <form class="form" id="post-form">
      <input type="hidden" id="post-id">
      <label>Title<input type="text" id="title" required></label>
      <label>Slug<input type="text" id="slug" pattern="[a-z0-9-]+" required>
        <span class="hint">Lowercase, numbers and dashes. The post lives at /blog/&lt;slug&gt;.</span>
      </label>
      <label>Excerpt<input type="text" id="excerpt">
        <span class="hint">One line, shown on the blog index and in link previews.</span>
      </label>
      <label>Originally published at<input type="url" id="canonical_url" placeholder="https://…">
        <span class="hint">Only for posts first published elsewhere. Sets the canonical link so search engines credit the original.</span>
      </label>
      <label>Source<input type="text" id="source" placeholder="Medium">
        <span class="hint">Shown as a tag on the blog index, e.g. Medium.</span>
      </label>
      <label>Body<textarea id="body" rows="16"></textarea>
        <span class="hint">Markdown, with live preview. Raw HTML works too. Drag an image in, or use the picture button, to upload it.</span>
      </label>
      <label class="check"><input type="checkbox" id="published"> Published</label>
      <div class="app-links">
        <button class="btn primary" type="submit">Save</button>
        <button class="btn" type="button" id="reset">New post</button>
      </div>
      <p class="form-msg" id="post-msg"></p>
    </form>

    <h2>Stats</h2>
    <div class="stats" id="stats"></div>
    <p class="hint" id="stats-note"></p>

    <h2>All posts</h2>
    <div id="list"></div>
  </section>

<script src="/js/config.js"></script>
<script src="https://unpkg.com/easymde@2.18.0/dist/easymde.min.js"></script>
<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const db = createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);

const el = (id) => document.getElementById(id);
const login = el('login'), editor = el('editor'), list = el('list');

const slugify = (s) => s.toLowerCase().trim()
  .replace(/[^a-z0-9\s-]/g, '')
  .replace(/\s+/g, '-')
  .replace(/-+/g, '-');

// Markdown editor with live preview. Raw HTML in the body still works.
const mde = new EasyMDE({
  element: el('body'),
  spellChecker: false,
  autoDownloadFontAwesome: true,
  placeholder: 'Write in markdown. Drag an image in to upload it.',
  uploadImage: true,
  imageUploadFunction: uploadImage,
  toolbar: ['bold', 'italic', 'heading', '|', 'quote', 'unordered-list', 'ordered-list',
            '|', 'link', 'upload-image', 'code', '|', 'preview', 'side-by-side', 'guide'],
});

// First image in the body becomes the card image on the blog index.
function firstImage(body) {
  const md = body.match(/!\[[^\]]*\]\(([^)\s]+)/);
  if (md) return md[1];
  const html = body.match(/<img[^>]+src=["']([^"']+)["']/i);
  return html ? html[1] : null;
}

async function uploadImage(file, onSuccess, onError) {
  const ext = (file.name.split('.').pop() || 'png').toLowerCase();
  const path = `${Date.now()}-${slugify(file.name.replace(/\.[^.]+$/, '')) || 'image'}.${ext}`;

  const { error } = await db.storage.from('blog').upload(path, file, {
    cacheControl: '31536000',
    contentType: file.type || undefined,
  });

  if (error) {
    onError('Upload failed: ' + error.message);
    return;
  }
  const { data } = db.storage.from('blog').getPublicUrl(path);
  onSuccess(data.publicUrl);
}

async function render() {
  const { data: { session } } = await db.auth.getSession();
  login.hidden = !!session;
  editor.hidden = !session;
  el('signout').hidden = !session;
  if (!session) return;

  el('who').textContent = 'Signed in as ' + session.user.email;

  const { data, error } = await db
    .from('posts')
    .select('id, slug, title, published, published_at, updated_at, source, body')
    .order('updated_at', { ascending: false });

  if (error) {
    list.textContent = 'Could not load posts: ' + error.message;
    return;
  }

  renderStats(data);

  if (!data.length) {
    list.innerHTML = '<p class="prose">No posts yet.</p>';
    return;
  }

  list.replaceChildren(...data.map((post) => {
    const row = document.createElement('div');
    row.className = 'post-row';

    const title = document.createElement('span');
    title.className = 'post-row-title';
    title.textContent = post.title;

    const tag = document.createElement('span');
    tag.className = 'app-tag';
    tag.textContent = post.published ? 'Live' : 'Draft';

    const view = document.createElement('a');
    view.className = 'btn';
    view.href = '/blog/' + post.slug;
    view.target = '_blank';
    view.rel = 'noopener';
    view.textContent = 'View';
    if (!post.published) view.title = 'Draft — only visible to you once published';

    const edit = document.createElement('button');
    edit.className = 'btn';
    edit.type = 'button';
    edit.textContent = 'Edit';
    edit.onclick = () => load(post.id);

    const del = document.createElement('button');
    del.className = 'btn';
    del.type = 'button';
    del.textContent = 'Delete';
    del.onclick = async () => {
      if (!confirm('Delete "' + post.title + '"? This cannot be undone.')) return;
      const { error } = await db.from('posts').delete().eq('id', post.id);
      if (error) alert('Could not delete: ' + error.message);
      render();
    };

    row.append(title, tag, view, edit, del);
    return row;
  }));
}

function renderStats(posts) {
  const words = posts.reduce(
    (n, p) => n + (p.body || '').replace(/<[^>]+>/g, ' ').split(/\s+/).filter(Boolean).length, 0);
  const live = posts.filter((p) => p.published);
  const latest = live
    .map((p) => p.published_at)
    .filter(Boolean)
    .sort()
    .pop();

  const cells = [
    ['Posts', posts.length],
    ['Published', live.length],
    ['Drafts', posts.length - live.length],
    ['Words', words.toLocaleString()],
    ['Last published', latest ? new Date(latest).toLocaleDateString('en-GB',
      { day: 'numeric', month: 'short', year: 'numeric' }) : '—'],
  ];

  document.getElementById('stats').replaceChildren(...cells.map(([label, value]) => {
    const tile = document.createElement('div');
    tile.className = 'stat';
    const v = document.createElement('span');
    v.className = 'stat-value';
    v.textContent = value;
    const l = document.createElement('span');
    l.className = 'stat-label';
    l.textContent = label;
    tile.append(v, l);
    return tile;
  }));

  document.getElementById('stats-note').textContent =
    'These count what is in the database. Page views and visitors are not stored here — they live in Vercel Web Analytics.';
}

async function load(id) {
  const { data, error } = await db.from('posts').select('*').eq('id', id).single();
  if (error) return;
  el('post-id').value = data.id;
  el('title').value = data.title;
  el('slug').value = data.slug;
  el('excerpt').value = data.excerpt || '';
  el('canonical_url').value = data.canonical_url || '';
  el('source').value = data.source || '';
  mde.value(data.body || '');
  el('published').checked = data.published;
  el('post-msg').textContent = '';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

el('reset').onclick = () => {
  el('post-form').reset();
  el('post-id').value = '';
  mde.value('');
  el('post-msg').textContent = '';
};

el('title').addEventListener('blur', () => {
  if (!el('slug').value) el('slug').value = slugify(el('title').value);
});

el('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  el('login-msg').textContent = 'Signing in…';
  const { error } = await db.auth.signInWithPassword({
    email: el('email').value,
    password: el('password').value
  });
  el('login-msg').textContent = error ? error.message : '';
  if (!error) { el('login-form').reset(); render(); }
});

el('signout').addEventListener('click', async (e) => {
  e.preventDefault();
  await db.auth.signOut();
  render();
});

el('post-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const msg = el('post-msg');

  // The textarea is hidden by EasyMDE, so a `required` attribute on it would
  // block submit with an unfocusable-field error. Check the editor instead.
  if (!mde.value().trim()) {
    msg.textContent = 'The body is empty.';
    return;
  }
  msg.textContent = 'Saving…';

  const published = el('published').checked;
  const row = {
    title: el('title').value.trim(),
    slug: el('slug').value.trim(),
    excerpt: el('excerpt').value.trim() || null,
    canonical_url: el('canonical_url').value.trim() || null,
    source: el('source').value.trim() || null,
    body: mde.value(),
    cover_url: firstImage(mde.value()),
    published
  };

  const id = el('post-id').value;
  let error;

  if (id) {
    // Stamp published_at the first time a post goes live, and leave it alone after.
    const { data: current } = await db.from('posts').select('published_at').eq('id', id).single();
    if (published && !current?.published_at) row.published_at = new Date().toISOString();
    ({ error } = await db.from('posts').update(row).eq('id', id));
  } else {
    if (published) row.published_at = new Date().toISOString();
    ({ error } = await db.from('posts').insert(row));
  }

  if (error) {
    msg.textContent = error.message;
    return;
  }
  msg.textContent = 'Saved.';
  el('post-form').reset();
  el('post-id').value = '';
  mde.value('');
  render();
});

db.auth.onAuthStateChange(render);
render();
</script>
</body>
