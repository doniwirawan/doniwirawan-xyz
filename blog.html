<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const db = createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
const list = document.getElementById('posts');

const fmt = (d) => new Date(d).toLocaleDateString('en-GB', {
  day: 'numeric', month: 'long', year: 'numeric'
});

const { data, error } = await db
  .from('posts')
  .select('slug, title, excerpt, published_at, source, cover_url')
  .eq('published', true)
  .order('published_at', { ascending: false });

if (error) {
  list.innerHTML = '<p class="prose">Could not load posts right now.</p>';
  console.error(error);
} else if (!data.length) {
  list.innerHTML = '<p class="prose">No posts yet.</p>';
} else {
  list.replaceChildren(...data.map((post) => {
    const card = document.createElement('a');
    card.className = 'post-card';
    card.href = '/blog/' + post.slug;

    // Every card carries an image. Fall back to the site mark if a post has no
    // cover, or if the cover URL is dead — a broken image would wreck the grid.
    const cover = document.createElement('img');
    cover.className = 'post-cover';
    cover.src = post.cover_url || '/images/icon.png';
    cover.alt = '';
    cover.loading = 'lazy';
    cover.onerror = () => { cover.onerror = null; cover.src = '/images/icon.png'; };
    card.append(cover);

    const text = document.createElement('div');
    text.className = 'post-card-text';

    const h3 = document.createElement('h3');
    h3.textContent = post.title;

    if (post.source) {
      const tag = document.createElement('span');
      tag.className = 'app-tag';
      tag.textContent = post.source;
      h3.append(tag);
    }

    const meta = document.createElement('p');
    meta.className = 'post-date';
    meta.textContent = post.published_at ? fmt(post.published_at) : '';

    text.append(h3, meta);

    if (post.excerpt) {
      const p = document.createElement('p');
      p.className = 'post-excerpt';
      p.textContent = post.excerpt;
      text.append(p);
    }
    card.append(text);
    return card;
  }));
}
</script>
